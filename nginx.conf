server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Photo cache (served from bind-mounted volume)
    location /photo-cache/ {
        alias /usr/share/nginx/photo-cache/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # MeiliSearch search proxy — key stays server-side
    location /api/search {
        # Strip /api/search, forward query param to MeiliSearch
        set $query $arg_q;
        proxy_pass http://research-meili:7700/indexes/reports/search?q=$query&attributesToHighlight=content_text&highlightPreTag=%3Cmark%3E&highlightPostTag=%3C/mark%3E&limit=5;
        proxy_set_header Authorization "Bearer ${MEILI_MASTER_KEY}";
        proxy_set_header Content-Type "application/json";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*";
    }

    # Pagefind assets
    location /pagefind/ {
        try_files $uri =404;
        expires 1h;
    }

    # 404 handling
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
